<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SvxLink Setup</title>
    <link rel="stylesheet" href="{{ url_for('css_file', filename='site.css') }}">
    <link rel="icon" href="{{ url_for('image_file', filename='svxlink_logo.png') }}" type="image/x-icon">
</head>
<body>
    <main class="page">
        <section class="card">
            <div class="page-header">
                <img class="page-icon" src="{{ url_for('image_file', filename='svxlink_logo.png') }}" alt="SvxLink icon">
                <div class="page-heading">
                    <h1>Talkgroup Configuration</h1>
                    <p>Enter the talkgroup ID you wish to use for this node. This will be used for DMR and/or YSF linking.</p>
                </div>
            </div>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form id="talkgroup-form" action="/talkgroup" method="post">
        <div class="field-group">
            <label class="label" for="talkgroup_id">Talkgroup ID:</label>
            <input class="input-field" type="text" id="talkgroup_id" name="talkgroup_id" placeholder="Enter talkgroup ID (e.g., 3100)" oninput="this.value = this.value.toUpperCase();">
        </div>

        <button class="button-primary" type="submit">Continue</button>
    </form>
</section>
</main>
</body>
</html>
