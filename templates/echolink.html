<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SvxLink Setup</title>
    <link rel="stylesheet" href="{{ url_for('css_file', filename='site.css') }}">
    <link rel="icon" href="{{ url_for('image_file', filename='svxlink_logo.png') }}" type="image/x-icon">
</head>
<body>
    <main class="page">
        <section class="card">
            <div class="page-header">
                <img class="page-icon" src="{{ url_for('image_file', filename='svxlink_logo.png') }}" alt="SvxLink icon">
                <div class="page-heading">
                    <h1>EchoLink Configuration</h1>
                    <p>Enter the EchoLink node ID you wish to use for this node.</p>
                </div>
            </div>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form id="echolink-form" action="/echolink" method="post">
        <div class="field-group">
            <label class="label" for="echolink_id">EchoLink Node ID:</label>
            <input class="input-field" type="text" id="echolink_id" name="echolink_id" placeholder="Enter EchoLink node ID (e.g., 123456)" oninput="this.value = this.value.toUpperCase();">
        </div>

        <button class="button-primary" type="submit">Continue</button>
    </form>
</section>
</main>
</body>
</html>
