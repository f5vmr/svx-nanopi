<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SvxLink Setup Complete</title>
    <link rel="stylesheet" href="{{ url_for('css_file', filename='site.css') }}">
    <link rel="icon" href="{{ url_for('image_file', filename='svxlink_logo.png') }}" type="image/x-icon">
</head>
<body>
    <main class="page">
        <section class="card">
            <div class="page-header">
                <img class="page-icon" src="{{ url_for('image_file', filename='svxlink_logo.png') }}" alt="SvxLink icon">
                <div class="page-heading">
                    <h1>SvxLink Configuration Complete</h1>
                    <p>Your configuration has been saved.</p>
                </div>
            </div>
            <p>If you want to start again from the backup, restore the previous config and reopen setup.</p>
            
<form action="/restart" method="post">
    <button class="button-secondary" type="submit">
        Start Again from Backup
    </button>
</form>

<form action="/launch" method="post">
    <button class="button-primary" type="submit">
        Launch SvxLink
    </button>
</form>
        </section>
    </main>
</body>
</html>
